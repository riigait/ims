# Production — pulls pre-built images from GitHub Container Registry
# Usage:
#   cp .env.example .env   # fill in your secrets
#   docker-compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ims_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ims_db}
      POSTGRES_USER: ${POSTGRES_USER:-ims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ims_user} -d ${POSTGRES_DB:-ims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network
    restart: unless-stopped

  backend:
    image: ghcr.io/riigait/ims-backend:latest
    container_name: ims_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ims_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-before-deploying}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ims-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/riigait/ims-frontend:latest
    container_name: ims_frontend
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - ims-network
    restart: unless-stopped

networks:
  ims-network:
    driver: bridge

volumes:
  postgres_data:
